name: Gmail Digest

on:
  schedule:
    - cron: "0 * * * *" # Hourly
  workflow_dispatch: # Manual run

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Gmail token
        run: echo "$GMAIL_TOKEN" | base64 -d > token.json
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}

      - name: Collect Gmail and upload digest
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_TOKEN_FILE: token.json
          AIT_DASH_URL: ${{ secrets.AIT_DASH_URL }}
          AIT_API_KEY: ${{ secrets.AIT_API_KEY }}
          DASHBOARD_WEBHOOK_URL: ${{ secrets.DASHBOARD_WEBHOOK_URL }}
          DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
